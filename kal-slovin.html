<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Slovin</title>
<link rel="icon"
href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧮</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at 20% 20%, rgba(43,122,120,.9), transparent 35%),
radial-gradient(circle at 80% 75%, rgba(166,115,89,.7), transparent 35%),
radial-gradient(circle at center, rgba(255,255,255,.05), transparent 25%),
linear-gradient(
180deg,
#19353d,
#274c56,
#4a5f63
);
}
body::before{
content:"";
position:fixed;inset:0;
backdrop-filter:blur(80px);
}

.wrapper{
width:1100px;
height:650px;
display:flex;
position:relative;
z-index:1;
}

.main{
flex:1;
background:rgba(20,25,30,.28);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.35);
border-radius:28px 0 0 28px;
padding:40px;
display:flex;
justify-content:center;
align-items:flex-start;
}

.sidebar{
width:280px;
background:rgba(15,20,25,.40);
backdrop-filter:blur(30px);
border-left:1px solid rgba(255,255,255,.25);
border-radius:0 28px 28px 0;
padding:30px;
}

.dots{display:flex;gap:12px;margin-bottom:40px}
.dot{width:18px;height:18px;border:2px solid #fff;border-radius:50%}

h1{
color:white;
font-weight:600;
margin-bottom:10px;
}
.sub{color:rgba(255,255,255,.9);margin-bottom:30px}

.card{
max-width:470px;
width:100%;
margin:auto;
display:flex;
flex-direction:column;    
}

label{
display:block;
color:white;
margin:15px 0 8px;
}

input{
width:100%;
padding:15px;
border-radius:16px;
background:rgba(255,255,255,.12);
color:white;
border:1px solid rgba(255,255,255,.15);
font-size:16px;
}

input::placeholder{color:rgba(255,255,255,.7)}

button{
width:100%;
margin-top:20px;
padding:15px;
border:none;
border-radius:16px;
background:linear-gradient(
135deg,
#ff9966,
#ff6b6b
);
color:white;
font-weight:700;
box-shadow:
0 4px 10px rgba(255,107,107,.35);
cursor:pointer;
backdrop-filter:blur(10px);
transition:.3s;
}

button:hover{
background:linear-gradient(
135deg,
#ffaa80,
#ff7f7f
);
transform:translateY(-2px);
}

.result{
display:none;
margin-top:20px;
padding:20px;
max-height:220px;
overflow-y:auto;
border-radius:20px;
background:rgba(255,255,255,.75);
color:#2d3436;
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.4);
}

.final{
font-size:42px;
font-weight:700;
text-align:center;
margin-top:15px;
}

.sidebar h3{
color:white;
margin-bottom:20px;
}

.history{
max-height:380px;
overflow:auto;
color:white;
}

.history table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

.history th,.history td{
padding:10px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.15);
}

.sidebar{
    position:relative;
}

.clock{
position:absolute;
bottom:25px;
right:25px;
font-size:42px;
color:white;
}

.clear{
margin-top:15px;
background:rgba(255,100,100,.35);
}

@media(max-width:1000px){
body{overflow:auto;padding:20px}
.wrapper{width:100%;height:auto;flex-direction:column}
.main{border-radius:28px 28px 0 0}
.sidebar{width:100%;border-radius:0 0 28px 28px}
.clock{position:static;margin-top:20px}
}
/* ==========================
   RESPONSIVE MOBILE
========================== */
@media screen and (max-width: 768px){
    body{
        height:auto;
        min-height:100vh;
        overflow-y:auto;
        padding:20px 10px;
    }
    .wrapper{
        width:100%;
        height:auto;
        flex-direction:column;
        border-radius:20px;
    }
    .main{
        width:100%;
        padding:20px;
    }
    .sidebar{
        width:100%;
        border-left:none;
        border-top:1px solid rgba(255,255,255,.15);
        min-height:auto;
        padding:20px;
    }
    .card{
        max-width:100%;
        width:100%;
    }
    h1{
        font-size:28px;
        text-align:center;
    }
    .sub{
        text-align:center;
    }
    input{
        font-size:16px;
    }
    button{
        font-size:15px;
        padding:14px;
    }
    .result{
        max-height:none;
    }
    .final{
        font-size:32px;
    }
    .clock{
        display:none;
    }
    .dots{
        display:none;
    }
    table{
        font-size:12px;
    }
    .card{
        padding-top:0;
    }
    th,td{
        padding:8px 4px;
    }
    h1{
        margin-top:0;
    }
}
</style>
</head>
<body>

<div class="wrapper">

<div class="main">
<div class="dots">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<div class="card">
<h1>Kalkulator Slovin</h1>
<div class="sub">RSUD Srengat Kabupaten Blitar</div>

<label>Jumlah Populasi (N)</label>
<input type="number" id="N" placeholder="Contoh 1000">

<label>Margin Error (%)</label>
<input type="number" id="e" value="5">

<button onclick="hitung()">Hitung Sampel</button>

<div class="result" id="result">
<p id="s1"></p>
<p id="s2"></p>
<p id="s3"></p>
<div class="final" id="hasil"></div>
</div>
</div>


</div>

<div class="sidebar">
<h3>Riwayat Perhitungan</h3>

<div class="clock" id="clock"></div>
<div class="history">
<table>
<thead>
<tr>
<th>No</th>
<th>N</th>
<th>Error</th>
<th>Hasil</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

<button class="clear" onclick="hapus()">Hapus Riwayat</button>

</div>

</div>

<script>
let no=0;

function hitung(){
let N=parseFloat(document.getElementById('N').value);
let e=parseFloat(document.getElementById('e').value)/100;

if(!N||!e){
alert('Lengkapi data terlebih dahulu');
return;
}

let e2=e*e;
let penyebut=1+(N*e2);
let n=Math.ceil(N/penyebut);

s1.innerHTML='e² = '+e2.toFixed(4);
s2.innerHTML='N × e² = '+(N*e2).toFixed(2);
s3.innerHTML='1 + (N × e²) = '+penyebut.toFixed(2);
hasil.innerHTML='n = '+n;

result.style.display='block';

no++;
tb.insertAdjacentHTML('afterbegin',
`<tr>
<td>${no}</td>
<td>${N}</td>
<td>${e*100}%</td>
<td>${n}</td>
</tr>`);
}

function hapus(){
tb.innerHTML='';
no=0;
}

function updateClock(){
const d=new Date();
clock.innerHTML=d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
